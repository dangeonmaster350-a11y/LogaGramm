<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Донат | Black Russia</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0f1117;
            --card: #1a1d27;
            --border: #2a2d38;
            --accent: #ff4d6a;
            --green: #4cff8d;
            --text: #fff;
            --sub: #888;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: radial-gradient(circle at 20% 50%, rgba(120, 50, 200, 0.10) 0%, transparent 50%);
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 450px;
        }
        h1 {
            text-align: center;
            font-size: 26px;
            margin-bottom: 6px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        h1 span { color: var(--accent); }
        .subtitle {
            text-align: center;
            color: var(--sub);
            font-size: 13px;
            margin-bottom: 28px;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 22px 20px;
            margin-bottom: 14px;
        }
        .card-label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--sub);
            margin-bottom: 10px;
        }
        /* Поле суммы */
        .amount-input-wrapper {
            display: flex;
            align-items: center;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            background: #11131b;
            transition: border-color 0.2s;
        }
        .amount-input-wrapper:focus-within {
            border-color: var(--accent);
        }
        .currency-symbol {
            font-size: 20px;
            font-weight: 700;
            color: var(--accent);
            margin-right: 10px;
        }
        .amount-input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-size: 22px;
            font-weight: 600;
            min-width: 0;
        }
        .amount-input-wrapper input::placeholder { color: #444; font-weight: 400; }
        .quick-amounts {
            display: flex;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        .quick-amount {
            flex: 1;
            min-width: 55px;
            padding: 10px 6px;
            background: #11131b;
            border: 1px solid var(--border);
            border-radius: 10px;
            color: #ccc;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
        }
        .quick-amount:hover { border-color: var(--accent); color: #fff; }
        .quick-amount.selected {
            border-color: var(--accent);
            background: #251a20;
            color: var(--accent);
        }
        /* Серверы */
        .server-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .server-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: #11131b;
        }
        .server-option:hover { border-color: #555; }
        .server-option.selected {
            border-color: var(--green);
            background: #121d18;
            box-shadow: 0 0 14px rgba(76, 255, 141, 0.1);
        }
        .server-radio {
            width: 20px; height: 20px;
            border-radius: 50%;
            border: 2px solid #555;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .server-option.selected .server-radio {
            border-color: var(--green);
            background: var(--green);
            box-shadow: 0 0 8px rgba(76, 255, 141, 0.5);
        }
        .server-radio::after {
            content: '';
            width: 6px; height: 6px;
            background: #0f1117;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .server-option.selected .server-radio::after { opacity: 1; }
        .server-name {
            font-weight: 600;
            font-size: 15px;
        }
        .server-desc {
            font-size: 11px;
            color: var(--sub);
        }
        /* Итого */
        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 15px;
        }
        .total-amount {
            font-size: 22px;
            font-weight: 700;
            color: var(--green);
        }
        .server-selected-tag {
            font-size: 13px;
            color: var(--sub);
            text-align: right;
        }
        .server-selected-tag span { color: var(--text); font-weight: 600; }
        /* Кнопка */
        .pay-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #ff4d6a, #e03e53);
            color: #fff;
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            margin-top: 8px;
        }
        .pay-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(255, 77, 106, 0.4);
        }
        .pay-btn:disabled {
            background: #2a2a2a;
            color: #666;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Донат <span>Магазин</span></h1>
        <p class="subtitle">Поддержка проекта Black Russia</p>

        <!-- ВЫБОР СУММЫ -->
        <div class="card">
            <span class="card-label">💸 Сумма доната</span>
            <div class="amount-input-wrapper">
                <span class="currency-symbol">₽</span>
                <input type="number" id="amountInput" placeholder="Введите сумму" min="1" value="">
            </div>
            <div class="quick-amounts" id="quickAmounts">
                <div class="quick-amount" data-amount="100">100₽</div>
                <div class="quick-amount" data-amount="300">300₽</div>
                <div class="quick-amount" data-amount="500">500₽</div>
                <div class="quick-amount" data-amount="1000">1 000₽</div>
                <div class="quick-amount" data-amount="2500">2 500₽</div>
            </div>
        </div>

        <!-- ВЫБОР СЕРВЕРА -->
        <div class="card">
            <span class="card-label">🌐 Сервер</span>
            <div class="server-list" id="serverList">
                <div class="server-option" data-server="EKB">
                    <div class="server-radio"></div>
                    <div>
                        <div class="server-name">EKB — Екатеринбург</div>
                        <div class="server-desc">Основной сервер</div>
                    </div>
                </div>
                <div class="server-option" data-server="MSK">
                    <div class="server-radio"></div>
                    <div>
                        <div class="server-name">MSK — Москва</div>
                        <div class="server-desc">Центральный регион</div>
                    </div>
                </div>
                <div class="server-option" data-server="SPB">
                    <div class="server-radio"></div>
                    <div>
                        <div class="server-name">SPB — Санкт-Петербург</div>
                        <div class="server-desc">Северо-Запад</div>
                    </div>
                </div>
                <div class="server-option" data-server="KZN">
                    <div class="server-radio"></div>
                    <div>
                        <div class="server-name">KZN — Казань</div>
                        <div class="server-desc">Приволжский регион</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ИТОГО -->
        <div class="card">
            <div class="total-row">
                <span>Сумма к оплате</span>
                <span class="total-amount" id="totalDisplay">0 ₽</span>
            </div>
            <div class="server-selected-tag" id="serverTag">
                Сервер: <span>не выбран</span>
            </div>
        </div>

        <!-- КНОПКА -->
        <button class="pay-btn" id="payButton" disabled>Перейти к оплате</button>
    </div>

    <script>
        // --- ЭЛЕМЕНТЫ ---
        const amountInput = document.getElementById('amountInput');
        const quickAmounts = document.querySelectorAll('.quick-amount');
        const serverOptions = document.querySelectorAll('.server-option');
        const totalDisplay = document.getElementById('totalDisplay');
        const serverTag = document.getElementById('serverTag');
        const payButton = document.getElementById('payButton');

        let selectedAmount = 0;
        let selectedServer = null;

        // --- ВЫБОР СУММЫ (поле ввода) ---
        amountInput.addEventListener('input', function() {
            let val = parseInt(this.value);
            if (isNaN(val) || val < 1) {
                selectedAmount = 0;
                this.value = '';
            } else {
                selectedAmount = val;
            }
            // Снять выделение с быстрых кнопок, если сумма не совпадает
            quickAmounts.forEach(btn => btn.classList.remove('selected'));
            const matchingBtn = document.querySelector(`.quick-amount[data-amount="${val}"]`);
            if (matchingBtn) matchingBtn.classList.add('selected');
            updateUI();
        });

        // --- БЫСТРЫЕ КНОПКИ СУММ ---
        quickAmounts.forEach(btn => {
            btn.addEventListener('click', function() {
                const amount = parseInt(this.getAttribute('data-amount'));
                selectedAmount = amount;
                amountInput.value = amount;
                quickAmounts.forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
                updateUI();
            });
        });

        // --- ВЫБОР СЕРВЕРА ---
        serverOptions.forEach(option => {
            option.addEventListener('click', function() {
                serverOptions.forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
                selectedServer = this.getAttribute('data-server');
                updateUI();
            });
        });

        // --- ОБНОВЛЕНИЕ ИНТЕРФЕЙСА ---
        function updateUI() {
            // Сумма
            if (selectedAmount > 0) {
                totalDisplay.textContent = selectedAmount.toLocaleString('ru-RU') + ' ₽';
            } else {
                totalDisplay.textContent = '0 ₽';
            }
            // Сервер
            if (selectedServer) {
                serverTag.innerHTML = 'Сервер: <span>' + selectedServer + '</span>';
            } else {
                serverTag.innerHTML = 'Сервер: <span>не выбран</span>';
            }
            // Кнопка активна только если выбраны и сумма, и сервер
            payButton.disabled = !(selectedAmount > 0 && selectedServer);
        }

        // --- КНОПКА ОПЛАТЫ ---
        payButton.addEventListener('click', function() {
            if (!selectedAmount || !selectedServer) return;

            // ЗАГЛУШКА — замени на свою логику оплаты
            const message = 
                `💳 Сумма: ${selectedAmount} ₽\n` +
                `🌐 Сервер: ${selectedServer}\n\n` +
                `[Здесь будет переход на платёжный шлюз]`;

            alert(message);

            // Пример реального перехода (раскомментируй и настрой):
            // const unitpayUrl = 'https://unitpay.money/pay/YOUR_PUBLIC_KEY';
            // const fullUrl = `${unitpayUrl}?sum=${selectedAmount}&account=${selectedServer}&desc=Donate_${selectedServer}`;
            // window.location.href = fullUrl;
        });

        // --- НАЧАЛЬНОЕ СОСТОЯНИЕ ---
        updateUI();
    </script>
</body>
</html>
